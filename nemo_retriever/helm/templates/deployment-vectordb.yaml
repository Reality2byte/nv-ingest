{{- if .Values.serviceConfig.vectordb.enabled }}
{{- $svc := .Values.service -}}
{{- $vdb := .Values.topology.vectordb -}}
{{- $fullname := include "nemo-retriever.fullname" . -}}
{{- $vdbName := printf "%s-vectordb" $fullname -}}
{{- $embedURL := include "nemo-retriever.nim.endpointURL" (dict "context" . "key" "vlm_embed" "serviceName" .Values.nimOperator.vlm_embed.nimServiceName "configKey" "embedInvokeUrl" "invokePath" "/v1/embeddings") -}}
{{- /*
  Fail-fast guard: rendering a vectordb Deployment without an embed
  endpoint produces a "healthy" Pod (its /v1/health probe only inspects
  LanceDB state) whose first /v1/query request then dies with HTTP 501
  ("No embedding endpoint configured."). Refuse to install in that
  configuration so the user gets a clear, actionable error at
  `helm install` / `helm upgrade` time instead of after ingestion.

  The embed endpoint can be supplied either explicitly via
  `serviceConfig.nimEndpoints.embedInvokeUrl`, or implicitly by enabling
  the in-cluster NIM Operator-managed embed NIM
  (`nimOperator.vlm_embed.enabled=true`, with the
  `apps.nvidia.com/v1alpha1` CRDs installed).
*/}}
{{- if not $embedURL }}
{{- fail "serviceConfig.vectordb.enabled=true but the embed endpoint could not be resolved. The vectordb Pod's /v1/query handler requires a NIM embedding endpoint. Pick one of: (1) set an explicit URL via --set serviceConfig.nimEndpoints.embedInvokeUrl=http://<host>:<port>/v1/embeddings; (2) enable the in-cluster embed NIM via --set nimOperator.vlm_embed.enabled=true (requires the apps.nvidia.com/v1alpha1 CRDs); or (3) disable the vectordb sub-stack via --set serviceConfig.vectordb.enabled=false. See nemo_retriever/helm/README.md section 'VectorDB and the embed endpoint' for details." -}}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $vdbName }}
  labels:
    {{- include "nemo-retriever.role.labels" (dict "context" $ "role" "vectordb") | nindent 4 }}
spec:
  replicas: {{ $vdb.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "nemo-retriever.role.selectorLabels" (dict "context" $ "role" "vectordb") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nemo-retriever.role.selectorLabels" (dict "context" $ "role" "vectordb") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "nemo-retriever.serviceAccountName" . }}
      {{- include "nemo-retriever.imagePullSecrets" . | nindent 6 }}
      {{- with $svc.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 30
      {{- with $vdb.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $vdb.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $vdb.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: vectordb
          image: "{{ $svc.image.repository }}:{{ $svc.image.tag }}"
          imagePullPolicy: {{ $svc.image.pullPolicy }}
          command:
            - python
            - -m
            - nemo_retriever.service.vectordb_app
          args:
            - --lancedb-uri
            - {{ .Values.serviceConfig.vectordb.lancedbUri | quote }}
            - --table-name
            - {{ .Values.serviceConfig.vectordb.tableName | quote }}
            - --embed-endpoint
            - {{ $embedURL | quote }}
            - --embed-model
            - {{ .Values.serviceConfig.vectordb.embedModel | quote }}
            - --port
            - {{ $vdb.port | quote }}
            - --embed-api-key
            - $(NVIDIA_API_KEY)
          ports:
            - name: http
              containerPort: {{ $vdb.port }}
              protocol: TCP
          env:
            - name: NVIDIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ngcApiSecret.name }}
                  key: NGC_API_KEY
                  optional: true
          resources:
            {{- toYaml $vdb.resources | nindent 12 }}
          volumeMounts:
            - name: vectordb-data
              mountPath: {{ .Values.serviceConfig.vectordb.lancedbUri }}
            - name: tmp
              mountPath: /tmp
          startupProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if $vdb.persistence.enabled }}
        - name: vectordb-data
          persistentVolumeClaim:
            claimName: {{ $vdbName }}-data
        {{- else }}
        - name: vectordb-data
          emptyDir: {}
        {{- end }}
{{- end }}
